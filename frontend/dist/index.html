60">Recent Seeds</h2> <div id="recent-seeds"><span class="loading loading-spinner loading-sm"></span> <span class="text-sm text-base-content/40">Loading...</span></div> </div> </section> <section class="card bg-base-100 border border-base-300 shadow-sm"> <div class="card-body p-5"> <h2 class="card-title text-sm uppercase tracking-wider text-base-content/60">Recent Drafts</h2> <div id="recent-drafts"><span class="loading loading-spinner loading-sm"></span> <span class="text-sm text-base-content/40">Loading...</span></div> </div> </section> </div> <section class="card bg-base-100 border border-base-300 shadow-sm mt-6"> <div class="card-body p-5"> <div class="flex items-center justify-between"> <h2 class="card-title text-sm uppercase tracking-wider text-base-content/60">Scheduled Drafts</h2> <button class="btn btn-xs btn-outline" id="btn-run-scheduler">Run scheduler</button> </div> <div id="scheduled-drafts"><span class="loading loading-spinner loading-sm"></span> <span class="text-sm text-base-content/40">Loading...</span></div> </div> </section> </main> <script type="module">const n="http://localhost:8000/api";async function l(){const[t,s,u,c,g]=await Promise.all([fetch(`${n}/sources`).then(e=>e.json()),fetch(`${n}/seeds`).then(e=>e.json()),fetch(`${n}/ideas`).then(e=>e.json()),fetch(`${n}/drafts`).then(e=>e.json()),fetch(`${n}/drafts/scheduled`).then(e=>e.json()).catch(()=>[])]),h=c.filter(e=>e.status==="published"),b=c.filter(e=>e.status==="draft");document.getElementById("stat-sources").textContent=t.length,document.getElementById("stat-seeds").textContent=s.length,document.getElementById("stat-ideas").textContent=u.length,document.getElementById("stat-drafts").textContent=b.length,document.getElementById("stat-published").textContent=h.length;const i=s.slice(-5).reverse();document.getElementById("recent-seeds").innerHTML=i.length?`<div class="divide-y divide-base-200">${i.map(e=>`
